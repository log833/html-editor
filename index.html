<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Editor</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px;
      background: #222;
      text-align: center;
      font-weight: bold;
    }

    .controls {
      display: flex;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      background: #ff5675;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* LEFT: EDITOR */
    .editor-area {
      width: 50%;
      display: flex;
      background: #000;
      border-right: 2px solid #222;
    }

    .lines {
      background: #0a0a0a;
      color: #666;
      padding: 10px 6px;
      text-align: right;
      user-select: none;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.4;
      border-right: 1px solid #222;
      white-space: pre;
    }

    textarea {
      flex: 1;
      padding: 10px;
      background: #000;
      color: #0f0;
      border: none;
      resize: none;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.4;
      outline: none;
      white-space: pre;
    }

    /* RIGHT: PREVIEW */
    .preview-area {
      width: 50%;
      background: #fff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    /* FULLSCREEN EDITOR */
    .editor-fullscreen .preview-area {
      display: none;
    }

    .editor-fullscreen .editor-area {
      width: 100%;
    }
  </style>
</head>
<body>
  <header>HTML Editor</header>

  <div class="controls">
    <button onclick="toggleEditorFullscreen()">Fullscreen</button>
    <button onclick="uploadHTML()">Upload</button>
    <button onclick="downloadHTML()">Download</button>
  </div>

  <div class="main" id="main">
    <!-- LEFT -->
    <div class="editor-area" id="editorArea">
      <div class="lines" id="lines"></div>
      <textarea id="editor"><!DOCTYPE html>
<html>
<head>
  <title>Example</title>
</head>
<body>
  <h1>Example</h1>
</body>
</html></textarea>
    </div>

    <!-- RIGHT -->
    <div class="preview-area">
      <iframe id="preview"></iframe>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".html" hidden />

  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const lines = document.getElementById('lines');
    const main = document.getElementById('main');
    const fileInput = document.getElementById('fileInput');

    function updateLines() {
      const totalLines = editor.value.split(/\n/).length;
      let nums = '';
      for (let i = 1; i <= totalLines; i++) nums += i + '\n';
      lines.textContent = nums;
    }

    function updatePreview() {
      preview.srcdoc = editor.value;
      updateLines();
    }

    editor.addEventListener('input', updatePreview);

    editor.addEventListener('scroll', () => {
      lines.scrollTop = editor.scrollTop;
    });

    function toggleEditorFullscreen() {
      main.classList.toggle('editor-fullscreen');
    }

    /* Upload HTML */
    function uploadHTML() {
      fileInput.click();
    }

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        editor.value = reader.result;
        updatePreview();
      };
      reader.readAsText(file);
    });

    /* Download HTML */
    function downloadHTML() {
      const blob = new Blob([editor.value], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'index.html';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // Initial load
    updatePreview();
  </script>
</body>
</html>
